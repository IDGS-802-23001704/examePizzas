{% macro render_field(field, icon_class="") %}
<div class="input-group">
    <label for="{{ field.id }}">
        {% if icon_class %}<i class="{{ icon_class }}"></i>{% endif %}
        {{ field.label.text }}
    </label>
    {{ field(class_="form-control", placeholder=field.label.text) }}
    
    {% if field.errors %}
        <ul class="error-list">
        {% for error in field.errors %}
            <li><i class="fas fa-exclamation-circle"></i> {{ error }}</li>
        {% endfor %}
        </ul>
    {% endif %}
</div>
{% endmacro %}
