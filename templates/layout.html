<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}🍕 Pizzería Andiamo{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: #fdf8f2;
            color: #2c1810;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 15px rgba(0,0,0,0.03);
            border-bottom: 2px solid #ff7e5f;
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ff7e5f;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-links {
            display: flex;
            gap: 10px;
        }

        .nav-link {
            text-decoration: none;
            color: #2c1810;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 30px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-link:hover {
            background: #ff7e5f10;
            color: #ff7e5f;
        }

        .nav-link.active {
            background: #ff7e5f;
            color: white;
        }

        /* Contenedor */
        .container {
            max-width: 1100px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* Cards */
        .card {
            background: white;
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.02);
            border: 1px solid #fff0e6;
        }

        .card h3 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ff7e5f;
        }

        /* Formularios */
        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #666;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ffe4d5;
            border-radius: 15px;
            font-family: inherit;
            transition: all 0.2s;
            background: #fffaf5;
        }

        .form-control:focus {
            border-color: #ff7e5f;
            outline: none;
            background: white;
        }

        /* Botones */
        .btn {
            background: #ff7e5f;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            border: 2px solid #ff7e5f;
        }

        .btn:hover {
            background: #ff6b4a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px #ff7e5f40;
        }

        .btn-secondary {
            background: #2c1810;
            border-color: #2c1810;
        }

        .btn-success {
            background: #5f8b4b;
            border-color: #5f8b4b;
            width: 100%;
        }

        .btn-danger {
            background: #ff4757;
            border-color: #ff4757;
            padding: 6px 12px;
            font-size: 0.8rem;
        }

        /* Mensajes */
        .alert {
            padding: 12px 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .error-list {
            color: #ff4757;
            list-style: none;
            padding: 5px 0 0 0;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="{{ url_for('index') }}" class="navbar-brand">
            <i class="fas fa-pizza-slice"></i> Andiamo
        </a>
        <div class="nav-links">
            <a href="{{ url_for('index') }}" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">
                <i class="fas fa-plus-circle"></i> Pedido
            </a>
            <a href="{{ url_for('ventas') }}" class="nav-link {% if request.endpoint == 'ventas' %}active{% endif %}">
                <i class="fas fa-chart-simple"></i> Ventas
            </a>
        </div>
    </nav>

    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert">
                        <i class="fas fa-check-circle"></i> {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
